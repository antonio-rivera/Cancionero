name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: my-new-app

      - run: npm run make
        working-directory: my-new-app

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: my-new-app/out/make/**
